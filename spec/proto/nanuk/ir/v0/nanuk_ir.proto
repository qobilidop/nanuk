// Nanuk IR v0: parser-level semantics above instruction selection and
// register allocation — extract/advance/mark/emit-SMD/dispatch over
// SSA-ish values. The hub format of the Nanuk satellite architecture.
//
// Conventions:
//   - states[0] is the start state (entry at word 0 after lowering).
//   - bit_offset is relative to the cursor at the point of the op; header
//     anchoring/epoch bookkeeping is a frontend concern, already resolved.
//   - value ids are unique per program (SSA-ish, no reassignment) and
//     start at 1 (0 means "unset" and is rejected by validation).
//   - debug_name fields carry human-readable names for diagnostics and
//     assembly comments only; they have no semantic weight.

syntax = "proto3";

package nanuk.ir.v0;

message ParserProgram {
  uint32 ir_version = 1;          // = 1
  repeated ParserState states = 2;      // states[0] is the start state
}

message ParserState {
  string name = 1;
  repeated ParserOp ops = 2;
  Terminator terminator = 3;
}

message ParserOp {
  oneof op {
    Extract extract = 1;          // value_id = extracted bits
    Advance advance = 2;
    Mark mark = 3;                // present-bit + offset record
    MdStore emit_md = 4;          // value -> metadata-window slots
    Shift shift = 5;              // value_id = src << amount
    MdLoad load_md = 6;           // value_id = metadata-window slot
  }
}

message Extract {
  uint32 value_id = 1;
  uint32 bit_offset = 2;
  uint32 width = 3;               // 1..64
  string debug_name = 4;          // e.g. "eth.dst"
}

message Advance {
  oneof amount {
    uint32 const_bytes = 1;
    uint32 value_id = 2;
  }
}

message Mark {
  uint32 hdr_id = 1;
  bool emit_sethdr = 2;           // false = re-anchor only (lowers to nothing)
  string debug_name = 3;          // e.g. "eth"
}

// The metadata window: MD_SLOTS x 16-bit slots flowing through the core
// like the frame does — loaded at ingress, edited in place by PP then MAP,
// delivered at egress. Slot meanings are system conventions, not IR
// semantics. Both program kinds share these two ops.

message MdStore {
  uint32 value_id = 1;
  uint32 slot = 2;
  uint32 nunits = 3;              // 1..4 16-bit units, MSB-first from here
                                  // (mirrors STMD; frontends set
                                  // ceil(value width / 16))
}

message MdLoad {
  uint32 value_id = 1;
  uint32 slot = 2;                // 0..7 — no special fields
  string debug_name = 3;
}

message Shift {
  uint32 value_id = 1;
  uint32 src_value_id = 2;
  uint32 amount = 3;              // 0..63
}

message Terminator {
  oneof kind {
    Dispatch dispatch = 1;
    Halt halt = 2;                // parser programs only
    Goto goto = 3;
    MapSend send = 4;             // MAP programs only
    Drop drop = 5;                // MAP programs only
  }
}

message Dispatch {
  uint32 value_id = 1;
  repeated Case cases = 2;        // ordered; first match wins
  Terminator default = 3;         // Halt or Goto (not nested Dispatch)
}

message Case {
  uint64 match = 1;
  string target_state = 2;
}

message Halt {
  bool drop = 1;
}

message Goto {
  string target_state = 1;
}

// ---------------------------------------------------------------------------
// MAP programs (match-action processor, the parser's sibling engine).
// Same conventions: states[0] starts, value ids unique per program and
// never cross states, debug_name is diagnostic-only. Byte offsets are
// header-relative and signed (negative reaches the headroom); hdr_id 15 is
// h_frame (frame start, always valid).

message MatchActionProgram {
  uint32 ir_version = 1;          // = 1 (same version space as ParserProgram)
  repeated TableDecl tables = 2;  // declarations only — entries are
                                  // control-plane state, never program text
  repeated MatchActionState states = 3;   // states[0] is the start state
}

message TableDecl {
  uint32 table_id = 1;            // 0..3
  uint32 key_width = 2;           // 1..64
  uint32 action_width = 3;        // 1..64
  string debug_name = 4;          // e.g. "l2"
}

message MatchActionState {
  string name = 1;
  repeated MatchActionOp ops = 2;
  Terminator terminator = 3;      // send/drop/goto/dispatch
}

message MatchActionOp {
  oneof op {
    MapLoad load = 1;             // value_id = window bytes (hdr-relative)
    MdLoad load_md = 2;           // value_id = metadata-window slot
    MapConst const = 3;           // value_id = 16-bit immediate
    MapAdd add = 4;               // value_id = src + signed const
    MapStore store = 5;           // window bytes = low nbytes of value
    Csum csum = 6;                // value_id = ones-complement checksum
    Lookup lookup = 7;            // the one op with control flow: hit
                                  // continues, miss transfers to miss_state
    MdStore store_md = 8;         // value -> metadata-window slots
    AndImm and_imm = 9;           // value_id = src & zero-extended imm
    Shift shift = 10;             // value_id = src << amount (shared message)
    MapBinOp bin_op = 11;         // value_id = lhs <op> rhs, both values
  }
}

// Register-register ALU (ISA v0.1). The immediate-only ops above cannot
// compute on two operands that both came off the wire; the calculator
// benchmark demands it. Total: every 64-bit pair has a result.
message MapBinOp {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_ADD = 1;                 // 64-bit wraparound
    KIND_SUB = 2;                 // 64-bit wraparound
    KIND_AND = 3;
    KIND_OR = 4;
    KIND_XOR = 5;
  }
  uint32 value_id = 1;
  Kind kind = 2;
  uint32 lhs_value_id = 3;
  uint32 rhs_value_id = 4;
}

message MapLoad {
  uint32 value_id = 1;
  uint32 hdr_id = 2;              // 0..15; 15 = h_frame
  sint32 byte_offset = 3;         // -512..511
  uint32 nbytes = 4;              // 1..8
  string debug_name = 5;          // e.g. "ipv4.ttl"
}

message MapConst {
  uint32 value_id = 1;
  uint32 imm = 2;                 // 16-bit
  string debug_name = 3;
}

message MapAdd {
  uint32 value_id = 1;
  uint32 src_value_id = 2;
  sint32 imm = 3;                 // sign-extended 16-bit
}

message MapStore {
  uint32 value_id = 1;
  uint32 hdr_id = 2;
  sint32 byte_offset = 3;
  uint32 nbytes = 4;
  string debug_name = 5;
}

message AndImm {
  uint32 value_id = 1;
  uint32 src_value_id = 2;
  uint32 imm = 3;                 // 16-bit, zero-extended
}

message Csum {
  uint32 value_id = 1;            // RFC 1071 checksum of the range (16-bit)
  uint32 hdr_id = 2;
  sint32 byte_offset = 3;
  uint32 len_value_id = 4;        // runtime length value — no IHL parsing
}

message Lookup {
  uint32 value_id = 1;            // action data on hit (0 in miss_state)
  uint32 table_id = 2;
  uint32 key_value_id = 3;
  string miss_state = 4;
}

message MapSend {
  reserved 1;                     // was bitmap_value_id — egress meaning
                                  // moved to the metadata window
  sint32 delta = 2;               // signed head delta (positive = prepend)
}

message Drop {}
