[project]
name = "nanuk-ir"
version = "0.1.0"
description = "nanuk IR: the protobuf parser-level interchange format and its IR -> assembly lowering"
requires-python = ">=3.12"
dependencies = [
    # Must stay >= the gencode version of the checked-in nanuk_ir_pb2.py
    # (regenerated by gen.py; keep the two in sync).
    "protobuf>=7.35",
]

[dependency-groups]
dev = [
    "pytest>=8",
    "grpcio-tools>=1.82",
    "nanuk-spec",
    "z3-solver>=4.16.0.0",
]

[tool.uv.sources]
nanuk-spec = { path = "../spec/python", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nanuk_ir"]
