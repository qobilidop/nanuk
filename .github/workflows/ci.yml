name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run CI checks
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ghcr.io/${{ github.repository }}/dev
          push: never
          runCmd: |
            cmake -B build
            cmake --build build --target check
            cmake --build build
            ctest --test-dir build --output-on-failure
            (cd spec/python && uv sync --quiet && uv run pytest -q)
            (cd hw && uv sync --quiet && NANUK_COSIM=1 uv run pytest tests -q)
            (cd lang && uv sync --quiet && NANUK_COSIM=1 uv run --group dev pytest tests -q)
            (cd compiler && uv sync --quiet && NANUK_COSIM=1 uv run --group dev pytest tests -q)
