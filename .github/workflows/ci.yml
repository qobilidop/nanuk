name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # IR schema tripwires: lint + wire-compatibility. Breaking compares
  # against HEAD~1 — the previous commit on push, the base branch on PRs
  # (merge commit's first parent). Guarded: skips when the compared
  # commit predates spec/proto.
  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          version: 1.71.0
      - name: Lint the IR schema
        run: buf lint spec/proto
      - name: Breaking-change check
        run: |
          if git cat-file -e HEAD~1:spec/proto/buf.yaml 2>/dev/null; then
            buf breaking spec/proto --against '.git#ref=HEAD~1,subdir=spec/proto'
          else
            echo "no schema module at HEAD~1; skipping breaking check"
          fi

  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run CI checks
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ghcr.io/${{ github.repository }}/dev
          push: never
          runCmd: |
            cmake -S spec/sail -B spec/sail/build
            cmake --build spec/sail/build --target check
            cmake --build spec/sail/build
            ctest --test-dir spec/sail/build --output-on-failure
            (cd sw/python && uv sync --quiet \
              && NANUK_COSIM=1 uv run pytest tests ../../web/py/tests -q \
              && uv run ruff check ../..)
            (cd hw/amaranth && uv sync --quiet \
              && NANUK_COSIM=1 uv run pytest tests -q)
