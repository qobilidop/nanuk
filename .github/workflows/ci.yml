name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run CI checks
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ghcr.io/${{ github.repository }}/dev
          push: never
          runCmd: |
            cmake -S sail -B sail/build
            cmake --build sail/build --target check
            cmake --build sail/build
            ctest --test-dir sail/build --output-on-failure
            (cd python && uv sync --quiet --extra rtl \
              && NANUK_COSIM=1 uv run pytest tests ../web/py/tests -q \
              && uv run ruff check ..)
