name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run CI checks
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ghcr.io/${{ github.repository }}/dev
          push: never
          runCmd: |
            cmake -S spec/sail -B spec/sail/build
            cmake --build spec/sail/build --target check
            cmake --build spec/sail/build
            ctest --test-dir spec/sail/build --output-on-failure
            (cd sw/python && uv sync --quiet \
              && NANUK_COSIM=1 uv run pytest tests ../../web/py/tests -q \
              && uv run ruff check ../..)
            (cd hw/amaranth && uv sync --quiet \
              && NANUK_COSIM=1 uv run pytest tests -q)
