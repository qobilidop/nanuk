name: Pages

on:
  push:
    branches: [main]
    paths: ['web/**', 'python/**', '.github/workflows/pages.yml']
  pull_request:
    paths: ['web/**', 'python/**', '.github/workflows/pages.yml']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build wheels + bridge assets
        run: web/scripts/build_wheels.sh

      - name: Build API docs (pdoc)
        working-directory: python
        run: |
          uv sync --quiet --extra rtl --group docs
          uv run pdoc nanuk nanuk.ir.symex '!nanuk.isa._asm_core' -o build/api

      - name: Install, test, build the SPA
        working-directory: web
        run: |
          npm ci
          npm test
          npm run build

      - name: Compose the site artifact
        run: |
          mkdir -p _site
          cp web/site/* _site/
          mkdir -p _site/play
          cp -r web/dist/* _site/play/
          mkdir -p _site/api
          cp -r python/build/api/* _site/api/

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
