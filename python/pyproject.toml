[project]
name = "nanuk"
version = "0.1.0"
description = "nanuk: protocol-level parser descriptions compiled through IR and ISA down to RTL"
requires-python = ">=3.12"
dependencies = [
    # Must stay >= the gencode version of the checked-in nanuk_ir_pb2.py
    # (regenerated by scripts/gen.py; keep the two in sync).
    "protobuf>=7.35",
]

[project.optional-dependencies]
rtl = ["amaranth[builtin-yosys]>=0.5"]  # heavy; never enters the Pyodide bundle

[project.scripts]
nanuk-asm = "nanuk.isa.asm:main"
nanuk-map-asm = "nanuk.isa.map_asm:main"

[dependency-groups]
dev = [
    "pytest>=8",
    "ruff>=0.15.21",
    "scapy>=2.5",
    "z3-solver>=4.16.0.0",
    "grpcio-tools>=1.82",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nanuk"]
